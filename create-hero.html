<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素编码勇者 - 勇者创建</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .hero-bounce {
            animation: bounce 2s infinite;
        }
        .selected {
            border: 4px solid #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }
    </style>
</head>
<body class="bg-gradient-to-b from-green-800 to-green-900 min-h-screen flex flex-col items-center">
    <!-- 标题 -->
    <h1 class="text-3xl font-bold text-white mt-12 mb-8 text-center">
        创建你的勇者
    </h1>
    
    <!-- 勇者形象选择 -->
    <div class="flex justify-center gap-8 mb-12">
        <div id="hero1" class="flex flex-col items-center cursor-pointer selected">
            <div class="w-32 h-32 bg-white rounded-full p-2 shadow-xl">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=pixel%20style%20warrior%20with%20sword%2C%208-bit%20graphics%2C%20vibrant%20colors&image_size=square" alt="勇者形象1" class="w-full h-full object-contain hero-bounce">
            </div>
            <span class="text-white font-medium mt-2">战士</span>
        </div>
        
        <div id="hero2" class="flex flex-col items-center cursor-pointer">
            <div class="w-32 h-32 bg-white rounded-full p-2 shadow-xl">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=pixel%20style%20mage%20with%20staff%2C%208-bit%20graphics%2C%20vibrant%20colors&image_size=square" alt="勇者形象2" class="w-full h-full object-contain hero-bounce">
            </div>
            <span class="text-white font-medium mt-2">法师</span>
        </div>
    </div>
    
    <!-- 昵称输入框 -->
    <div class="w-4/5 max-w-xs mb-8">
        <label for="nickname" class="block text-white font-medium mb-2">昵称</label>
        <div class="relative">
            <input type="text" id="nickname" placeholder="请输入你的勇者昵称" class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-yellow-500">
        </div>
    </div>
    
    <!-- 确认创建按钮 -->
    <button id="confirmBtn" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 px-8 rounded-full shadow-lg transition-all duration-300 transform hover:scale-105">
        确认创建
    </button>
    
    <script>
        // 勇者选择
        const hero1 = document.getElementById('hero1');
        const hero2 = document.getElementById('hero2');
        
        hero1.addEventListener('click', () => {
            hero1.classList.add('selected');
            hero2.classList.remove('selected');
        });
        
        hero2.addEventListener('click', () => {
            hero2.classList.add('selected');
            hero1.classList.remove('selected');
        });
        
        // 确认创建
        document.getElementById('confirmBtn').addEventListener('click', () => {
            const nickname = document.getElementById('nickname').value;
            if (nickname.trim() === '') {
                alert('请输入昵称');
                return;
            }
            // 存储角色信息
            localStorage.setItem('heroNickname', nickname);
            localStorage.setItem('heroType', hero1.classList.contains('selected') ? '战士' : '法师');
            // 跳转到主城
            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
